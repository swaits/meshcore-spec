[book]
title = "MeshCore Protocol Specification"
authors = ["SWaits"]
description = "An independent, AI-authored specification and conformance test corpus for the MeshCore mesh networking protocol. The official MeshCore C++ firmware is the source of truth; this spec is downstream."
language = "en"
src = "src"

[output.html]
default-theme = "navy"
preferred-dark-theme = "navy"
git-repository-url = "https://github.com/swaits/meshcore-spec"
edit-url-template = "https://github.com/swaits/meshcore-spec/edit/main/{path}"
# CI overrides per-version with MDBOOK_OUTPUT__HTML__SITE_URL.
# Default below targets the "latest" deploy from main.
site-url = "/meshcore-spec/latest/"
additional-js = ["theme/version-picker.js"]
additional-css = ["theme/version-picker.css"]

[output.html.fold]
enable = true
level = 1

[output.html.search]
enable = true
limit-results = 20
use-boolean-and = true
